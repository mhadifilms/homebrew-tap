name: Bump dvr formula

on:
  # Fires whenever the upstream dvr repo cuts a release.
  repository_dispatch:
    types: [dvr-release]
  # Also allow a manual trigger so you can force-bump to a given version.
  workflow_dispatch:
    inputs:
      version:
        description: "Version to bump to (defaults to latest on PyPI)."
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve target version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.client_payload.version }}" ]; then
            echo "version=${{ github.event.client_payload.version }}" >> "$GITHUB_OUTPUT"
          else
            v=$(python - <<'PY'
          import json, urllib.request
          with urllib.request.urlopen("https://pypi.org/pypi/dvr/json") as r:
              print(json.load(r)["info"]["version"])
          PY
          )
            echo "version=$v" >> "$GITHUB_OUTPUT"
          fi

      - name: Rewrite formula
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          python - <<'PY'
          import json, os, re, urllib.request
          from pathlib import Path

          version = os.environ["VERSION"]
          formula_path = Path("Formula/dvr.rb")
          text = formula_path.read_text()

          def fetch_sdist(name: str, ver: str | None = None) -> tuple[str, str]:
              endpoint = f"https://pypi.org/pypi/{name}/json" if ver is None else f"https://pypi.org/pypi/{name}/{ver}/json"
              with urllib.request.urlopen(endpoint) as r:
                  data = json.load(r)
              v = ver or data["info"]["version"]
              urls = data["releases"][v] if ver is None else data["urls"]
              sdist = [u for u in urls if u["packagetype"] == "sdist"][0]
              return sdist["url"], sdist["digests"]["sha256"]

          url, sha = fetch_sdist("dvr", version)
          text = re.sub(r'url "https://files\.pythonhosted\.org/packages/[^"]+/dvr-[^"]+\.tar\.gz"', f'url "{url}"', text)
          text = re.sub(
              r'(url "https://files\.pythonhosted\.org/packages/[^"]+/dvr-[^"]+\.tar\.gz"\n  sha256 ")[0-9a-f]+(")',
              lambda m: m.group(1) + sha + m.group(2),
              text,
          )

          def replace_resource(pkg: str) -> None:
              nonlocal text
              u, s = fetch_sdist(pkg)
              pattern = re.compile(
                  r'(resource "' + re.escape(pkg) + r'" do\n    url ")[^"]+(")\n    sha256 "[0-9a-f]+"',
                  re.DOTALL,
              )
              text = pattern.sub(lambda m: m.group(1) + u + m.group(2) + f'\n    sha256 "{s}"', text)

          for pkg in ("annotated-doc", "click", "markdown-it-py", "mdurl", "Pygments", "pyyaml", "rich", "shellingham", "typer"):
              replace_resource(pkg)

          formula_path.write_text(text)
          PY

      - name: Install Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Audit formula
        run: |
          mkdir -p "$(brew --repo)/Library/Taps/mhadifilms"
          ln -sfn "$PWD" "$(brew --repo)/Library/Taps/mhadifilms/homebrew-tap"
          brew audit --new mhadifilms/tap/dvr || true
          brew style mhadifilms/tap/dvr

      - name: Open PR
        uses: peter-evans/create-pull-request@v6
        with:
          branch: bump-dvr-${{ steps.version.outputs.version }}
          commit-message: "dvr: bump to ${{ steps.version.outputs.version }}"
          title: "dvr ${{ steps.version.outputs.version }}"
          body: |
            Automated formula bump for `dvr` **${{ steps.version.outputs.version }}**.

            Sources: PyPI `dvr==${{ steps.version.outputs.version }}` plus latest runtime deps.
          labels: automerge
